services:
  db:
    container_name: db
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sa -d cityreport" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports: 
      - 5432:5432
  adminer:
    container_name: adminer
    image: adminer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 8080:8080
    depends_on:
      - db
volumes:
  postgres_data: