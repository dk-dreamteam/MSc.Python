services:
  db:
    container_name: db
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sa -d cityreport" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports: 
      - 5432:5432
  adminer:
    container_name: adminer
    image: adminer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 8080:8080
    depends_on:
      - db
  azurite:
    container_name: azurite
    image: mcr.microsoft.com/azure-storage/azurite
    command: ["azurite", "-l", "/data", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0", "--loose", "--skipApiVersionCheck"]
    restart: unless-stopped
    ports:
      - 10000:10000
      - 10001:10001
      - 10002:10002
volumes:
  postgres_data: